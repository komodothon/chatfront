{% extends "layout.html" %}

{% block title %}
Chat | {{ username }}
{% endblock %}

{% block content %}
<div class="container py-4">
  <div class="row">
    <div class="col-md-8">
      <!-- Message Input (at Top) -->
      <div class="input-group mb-3">
        <input id="message-input" type="text" class="form-control" placeholder="Type a message...">
        <button id="send-btn" class="btn btn-primary">Send</button>
      </div>

      <!-- Chat Box (column-reverse to show newest at top) -->
      <div id="chat-container" class="border rounded p-3 mb-3 bg-light" style="height: 600px; overflow-y: auto; display: flex; flex-direction: column;">
        <div id="chat-box" style="display: flex; flex-direction: column;"></div>
      </div>
    </div>
    
    
    <!-- Online Users Panel (optional, for later) -->
    <div class="col-md-4">
      <div class="card">
        <div class="card-header bg-primary text-white">
          Online Users
        </div>
        <ul class="list-group list-group-flush" id="online-users"></ul>
      </div>
   
      <!-- Logout Button -->
      <button id="logout-btn" class="btn btn-outline-danger">
        <i class="bi bi-box-arrow-right me-1"></i> Logout
      </button>

    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  const CURRENT_USERNAME = "{{ username }}";
  const ws_token = "{{ ws_token }}";
</script>

<!-- Load external JS WebSocket client -->
<script src="{{ url_for('static', filename='js/ws_client.js') }}"></script>

{% endblock %}
